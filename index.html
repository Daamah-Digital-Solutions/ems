<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>EMS ElRiyadh — The studio comes to you</title>
  <meta name="description" content="Premium one-on-one EMS training brought to your home, hotel or compound in Riyadh. German-engineered with MyoStyle®. 20 minutes, twice a week." />
  <link rel="canonical" href="https://emselriyadh.com/" />
  <meta name="theme-color" content="#ED3B1B" />

  <!-- Icons (generated from src/ems-icon.svg via scripts/gen-icons.mjs) -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

  <!-- Open Graph / Twitter (static defaults; per-route values set at runtime). -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="EMS ElRiyadh" />
  <meta property="og:title" content="EMS ElRiyadh — The studio comes to you" />
  <meta property="og:description" content="Premium one-on-one EMS training brought to your home, hotel or compound in Riyadh. German-engineered with MyoStyle®. 20 minutes, twice a week." />
  <meta property="og:url" content="https://emselriyadh.com/" />
  <!-- TODO: final OG image. PNG is used because WhatsApp/Twitter don't render SVG previews. -->
  <meta property="og:image" content="https://emselriyadh.com/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="EMS ElRiyadh — the studio comes to you" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="EMS ElRiyadh — The studio comes to you" />
  <meta name="twitter:description" content="Premium one-on-one EMS training that comes to you across Riyadh. German-engineered with MyoStyle®." />
  <meta name="twitter:image" content="https://emselriyadh.com/og-image.png" />

  <!-- LocalBusiness structured data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "HealthAndBeautyBusiness",
    "name": "EMS ElRiyadh",
    "description": "Premium one-on-one mobile EMS personal training brought to your home, hotel or compound across Riyadh. German-engineered with MyoStyle®.",
    "url": "https://emselriyadh.com",
    "telephone": "+966540899508",
    "email": "info@emselriyadh.com",
    "image": "https://emselriyadh.com/og-image.png",
    "areaServed": { "@type": "City", "name": "Riyadh" },
    "address": { "@type": "PostalAddress", "addressLocality": "Riyadh", "addressCountry": "SA" },
    "priceRange": "$$$",
    "sameAs": ["https://www.instagram.com/emselriyadh/"]
  }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://images.unsplash.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,500;1,700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">

  <!-- Apply saved theme before paint to avoid a flash -->
  <script>
    try { var t = localStorage.getItem('ems-theme'); if (t) document.documentElement.setAttribute('data-theme', t); } catch (e) {}
    // Opt into scroll-reveal only when JS runs AND motion is allowed, set before
    // paint so reveals never flash, and content is always visible without JS.
    try { if (window.matchMedia && matchMedia('(prefers-reduced-motion: no-preference)').matches) document.documentElement.classList.add('reveal-ready'); } catch (e) {}
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
