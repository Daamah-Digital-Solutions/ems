      <path d="M616,535V505.42s77.79,7.84,81.41,97.69c0,0,1.8,78.39-81.41,93.47V665.83s41.61-3.62,47-64.83C663,601,667.23,553.06,616,535Z" transform="translate(-502.61 -503.42)"/>
